<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TATSUMAKI</title>

<style>
@font-face {
  font-family: 'PixelMplus12';
  src: url('https://cdn.jsdelivr.net/gh/itouhiro/PixelMplus@master/fonts/PixelMplus12-Regular.ttf') format('truetype');
  font-weight: normal;
}

/* ══ A SIDE ══ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy: #1a2140;
    --navy-light: #2a3358;
    --gold: #c9a054;
    --gold-light: #e5c17d;
    --cream: #fbf9f4;
    --charcoal: #222222;
    --gray-bg: #f4f4f4;
    --gray-text: #666666;
    --dot-color: rgba(26, 33, 64, 0.05);
  }

  body {
    font-family: 'Lato', 'Noto Sans JP', sans-serif;
    color: var(--charcoal);
    background-color: var(--cream);
    background-image: 
      radial-gradient(var(--dot-color) 1px, transparent 1px),
      radial-gradient(var(--dot-color) 1px, transparent 1px);
    background-size: 20px 20px;
    background-position: 0 0, 10px 10px;
    line-height: 1.8;
  }

  .container {
    width: 90%;
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 20px;
  }

  /* ══ B SIDE ══ */
  body.b-side-active {
    color: #00ff00 !important;
    background-color: #000000 !important;
    background-image: 
      linear-gradient(rgba(0, 255, 0, 0.1) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0, 255, 0, 0.1) 1px, transparent 1px) !important;
    background-size: 20px 20px !important;
    font-family: 'PixelMplus12', monospace !important;
  }
  body.b-side-active * {
    border-color: #00ff00 !important;
  }

  /* ══ アラート・バナー ══ */
  .system-banner {
    background-color: var(--navy);
    color: var(--cream);
    padding: 8px 0;
    font-size: 12px;
    text-align: center;
    letter-spacing: 2px;
    border-bottom: 1px dashed var(--gold);
  }

  /* ══ タイポグラフィ ══ */
  h1, h2, h3, h4, .brand-font {
    font-family: 'Cormorant Garamond', 'Noto Serif JP', serif;
    font-weight: 300;
    letter-spacing: 3px;
  }

  /* ══ ヘッダー ══ */
  header {
    padding: 40px 0;
    border-bottom: 1px solid rgba(26, 33, 64, 0.1);
  }
  .header-wrap {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .logo h1 {
    font-size: 28px;
    font-weight: 400;
    color: var(--navy);
  }
  .logo span {
    font-size: 10px;
    letter-spacing: 5px;
    display: block;
    color: var(--gold);
    margin-top: -5px;
  }

  /* ══ モードスイッチ ══ */
  .mode-switch-container {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .mode-label {
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--navy);
  }
  .switch {
    position: relative;
    display: inline-block;
    width: 50px;
    height: 24px;
  }
  .switch input { opacity: 0; width: 0; height: 0; }
  .slider {
    position: absolute;
    cursor: pointer;
    top: 0; left: 0; right: 0; bottom: 0;
    background-color: #e0e0e0;
    transition: .3s;
    border: 1px solid var(--navy);
  }
  .slider:before {
    position: absolute;
    content: "";
    height: 16px; width: 16px;
    left: 3px; bottom: 3px;
    background-color: var(--navy);
    transition: .3s;
  }
  input:checked + .slider { background-color: #111; border-color: #00ff00; }
  input:checked + .slider:before {
    transform: translateX(26px);
    background-color: #00ff00;
  }

  /* ══ メインヒーロー ══ */
  .hero {
    padding: 100px 0;
    text-align: center;
    border-bottom: 1px solid rgba(26, 33, 64, 0.1);
  }
  .hero-tag {
    font-size: 12px;
    color: var(--gold);
    letter-spacing: 4px;
    margin-bottom: 20px;
    display: block;
  }
  .hero h2 {
    font-size: 48px;
    color: var(--navy);

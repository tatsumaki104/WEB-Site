<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TATSUMAKI Creative Studio</title>

        var cleanUrl = window.location.protocol + '//' + window.location.host + window.location.pathname;

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: "Noto Sans JP", sans-serif;
            background-color: #000000;
            color: #ffffff;
            line-height: 1.6;
            overflow-x: hidden;
        }
        a {
            color: inherit;
            text-decoration: none;
        }
        .main-header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 80px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 4%;
            background-color: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            z-index: 100;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .logo {
            display: flex;
            flex-direction: column;
        }
        .logo-title {
            font-family: "Cinzel", serif;
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: 0.15em;
        }
        .logo-subtitle {
            font-size: 0.65rem;
            letter-spacing: 0.05em;
            color: #888888;
            margin-top: -2px;
        }
        .nav-links {
            display: flex;
            gap: 30px;
        }
        .nav-links a {
            font-size: 0.85rem;
            letter-spacing: 0.1em;
            transition: color 0.3s;
        }
        .nav-links a:hover {
            color: #888888;
        }
        .hamburger {
            display: none;
            background: none;
            border: none;
            cursor: pointer;
            flex-direction: column;
            gap: 6px;
            z-index: 110;
        }
        .hamburger span {
            display: block;
            width: 25px;
            height: 2px;
            background-color: #ffffff;
            transition: all 0.3s;
        }
        .mobile-nav {
            position: fixed;
            top: 0;
            right: -100%;
            width: 100%;
            height: 100vh;
            background-color: #000000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 40px;
            z-index: 105;
            transition: right 0.4s ease;
        }
        .mobile-nav.active {
            right: 0;
        }
        .mobile-nav a {
            font-size: 1.25rem;
            letter-spacing: 0.15em;
        }
        .hero-section {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            position: relative;
            padding: 0 4%;
        }
        .hero-title {
            font-family: "Cinzel", serif;
            font-size: 4rem;
            font-weight: 400;
            letter-spacing: 0.3em;
            margin-bottom: 20px;
            text-indent: 0.3em;
        }
